name: upi_india
description: A flutter plugin to do UPI transaction through different apps in Android.
version: 3.0.1+local.1
homepage: https://github.com/azhar1038/UPI-Plugin-Flutter

environment:
  sdk: ">=2.12.0 <4.0.0"
  flutter: ">=1.20.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.az.upi_india
        pluginClass: UpiIndiaPlugin
