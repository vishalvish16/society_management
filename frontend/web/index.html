<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Vidyron Society Management Software">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Vidyron Society">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Vidyron Society</title>
  <link rel="manifest" href="manifest.json">
  <!-- Razorpay checkout — must load before Flutter boots -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    window.openRazorpayCheckout = function(options, successCallback, errorCallback) {
      var rzp = new Razorpay(options);
      rzp.on('payment.success', function(resp) {
        successCallback(resp.razorpay_payment_id, resp.razorpay_order_id, resp.razorpay_signature);
      });
      rzp.on('payment.failed', function(resp) {
        errorCallback(resp.error ? (resp.error.description || 'Payment failed') : 'Payment failed');
      });
      rzp.open();
    };
  </script>
</head>
<body>
  <!-- Flutter loader (new init style). -->
  <script src="flutter.js"></script>
  <script>
    // CanvasKit/WebGL stability: if the browser loses the WebGL context,
    // reload the app once instead of crashing inside the engine.
    (function () {
      let reloaded = false;
      window.addEventListener(
        'webglcontextlost',
        function (e) {
          try { e.preventDefault(); } catch (_) {}
          if (reloaded) return;
          reloaded = true;
          console.warn('[web] WebGL context lost. Reloading app...');
          setTimeout(function () { location.reload(); }, 100);
        },
        { capture: true }
      );
    })();
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" defer></script>
</body>
</html>
